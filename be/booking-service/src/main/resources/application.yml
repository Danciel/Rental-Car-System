server:
  port: 8083

service:
  user:
    url: http://localhost:8081
  car:
    url: http://localhost:8082

spring:
  application:
    name: booking-service

  datasource:
    url: jdbc:postgresql://localhost:5433/booking_db
    #   TODO: use env vars for username and password
    username: p2p_admin
    password: secretpassword
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create # Test environment, use 'update' or 'validate' for production
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect